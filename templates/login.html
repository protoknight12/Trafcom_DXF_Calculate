<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>CNC Системи - Вход</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-container">
        <h2>Вход в CNC Портал</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}<div class="flash-message">{{ messages[0] }}</div>{% endif %}
        {% endwith %}
        <form action="{{ url_for('login') }}" method="POST">
            <input type="text" name="username" placeholder="Потребителско име" required>
            <input type="password" name="password" placeholder="Парола" required>
            <button type="submit" class="btn">Влез</button>
        </form>
        <div class="redirect-link">
            Нямате профил? <a href="{{ url_for('register') }}">Регистрирайте се тук</a>
        </div>
    </div>
</body>
</html>
