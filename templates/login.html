<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - CNC Портал</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-wrapper { display: flex; justify-content: center; align-items: center; min-height: 90vh; }
        .auth-card { width: 100%; max-width: 420px; }
        .auth-footer { margin-top: 24px; text-align: center; font-size: 0.9rem; color: var(--text-muted); }
        .auth-footer a { color: var(--accent-secondary); text-decoration: none; font-weight: 600; }
        .auth-footer a:hover { text-decoration: underline; color: var(--text-main); }
    </style>
</head>
<body>
<div class="admin-container auth-wrapper">
    <div class="admin-card auth-card">
        <h2 style="text-align: center; margin-bottom: 28px; margin-top: 0; background: var(--gradient-purple); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
            Вход в CNC Портал
        </h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-messages">
            {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'error' else category }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}" class="admin-form">
            <div class="form-group">
                <label for="username">Потребителско име</label>
                <input type="text" id="username" name="username" placeholder="Въведете потребителско име..." required autofocus autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">Парола</label>
                <input type="password" id="password" name="password" placeholder="Въведете вашата парола..." required>
            </div>
            <button type="submit" class="btn-submit" style="width: 100%; margin-top: 12px; padding: 14px;">
                Влез в системата
            </button>
        </form>

        <div class="auth-footer">
            Нямате профил? <a href="{{ url_for('register') }}">Регистрирайте се тук</a>
        </div>
    </div>
</div>
</body>
</html>
